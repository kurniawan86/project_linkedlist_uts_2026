<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex">

    <!-- Sidebar -->
    {{ template "sidebar" . }}

    <!-- Main Area -->
    <div class="flex-1 flex flex-col">

        <!-- Topbar -->
        {{ template "topbar" . }}

        <!-- Content -->
        <main class="p-10">

            <h1 class="text-3xl font-bold mb-4 text-gray-800">
                Berhasil Login
            </h1>

            <p class="text-gray-600 text-lg">
                Nama User: <span class="font-semibold text-blue-600">{{ .Nama }}</span>
            </p>

            <p class="text-gray-600 text-lg">
                Role: <span class="font-semibold text-blue-600">{{ .Role }}</span>
            </p>
        </main>
    </div>
</body>
</html>
