<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Management User</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex">

    <!-- Sidebar -->
    {{ template "sidebar" . }}

    <!-- Main -->
    <div class="flex-1 flex flex-col">

        <!-- Topbar -->
        {{ template "topbar" . }}

        <!-- Content -->
        <main class="p-10">

            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800">
                    Management User
                </h1>

                <a href="/users/create"
                   class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm">
                   + Tambah User
                </a>
            </div>

            <div class="bg-white shadow rounded-lg overflow-hidden">
                <table class="min-w-full text-sm">

                    <thead class="bg-gray-200">
                        <tr>
                            <th class="p-3 text-left">ID User</th>
                            <th class="p-3 text-left">Nama</th>
                            <th class="p-3 text-left">Role</th>
                            <th class="p-3 text-center">Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        {{ range .Users }}
                        <tr class="border-t hover:bg-gray-50">
                            <td class="p-3">{{ .IdUser }}</td>
                            <td class="p-3">{{ .NamaUser }}</td>
                            <td class="p-3">{{ .Role }}</td>
                            <td class="p-3 text-center space-x-2">
                                <a href="/users/edit?id={{ .IdUser }}"
                                   class="bg-yellow-400 px-2 py-1 rounded text-xs text-white">
                                   Edit
                                </a>
                                    <form action="/users/delete" method="POST" class="inline">
                                    <input type="hidden" name="id" value="{{ .IdUser }}">
                                    <button type="submit"
                                        onclick="return confirm('Yakin ingin menghapus user ini?')"
                                        class="bg-red-500 px-2 py-1 rounded text-xs text-white">
                                        Delete
                                    </button>

                                </form>
                            </td>
                        </tr>
                        {{ else }}
                        <tr>
                            <td colspan="4" class="p-4 text-center text-gray-500">
                                Tidak ada data user
                            </td>
                        </tr>
                        {{ end }}
                    </tbody>

                </table>
            </div>

        </main>
    </div>

</body>
</html>
